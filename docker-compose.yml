services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://localhost:4000}
    ports:
      - "${HOST_PORT:-3000}:80"
    environment:
      - API_URL=${API_URL:-http://localhost:4000}
    volumes:
      - app_data:/usr/share/nginx/html/data
    restart: always

volumes:
  app_data:
